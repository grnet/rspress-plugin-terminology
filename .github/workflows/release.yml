name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-alpha"* || "${{ github.event.release.prerelease }}" == "true" ]]; then
            npx -y npm@latest publish --provenance --access public --tag alpha
          else
            npx -y npm@latest publish --provenance --access public
          fi
